upstream daphne {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;

    # Gzip Compression for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Maximum upload size (helpful for profile/cover photos)
    client_max_body_size 20M;

    # Static files served by Nginx
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media files served by Nginx
    location /media/ {
        alias /app/media/;
    }

    # Proxy to Daphne for HTTP and WebSockets
    location / {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        
        # WebSocket Support (Upgrading connection)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Avoid timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
