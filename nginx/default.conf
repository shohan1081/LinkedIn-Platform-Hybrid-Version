upstream daphne {
    server web:8000;
}

# HTTP - Redirect all traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name anexousa.com www.anexousa.com;

    # Certbot challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Actual Application
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name anexousa.com www.anexousa.com;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/anexousa.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/anexousa.com/privkey.pem;

    # Professional SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDH+AESGCM:ECDH+AES256:ECDH+AES128:DH+3DES:!ADH:!AECDH:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Maximum upload size
    client_max_body_size 20M;

    # Static files served by Nginx
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media files served by Nginx
    location /media/ {
        alias /app/media/;
    }

    # Proxy to Daphne for HTTP and WebSockets
    location / {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        
        # WebSocket Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Long-lived connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
