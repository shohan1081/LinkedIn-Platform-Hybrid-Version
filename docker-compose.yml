services:
  # Redis service for WebSockets channel layers
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  # Main Django Application running with Daphne
  web:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      # Use Redis service name for REDIS_URL
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - redis

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: always
    depends_on:
      - web

volumes:
  static_volume:
  media_volume:
